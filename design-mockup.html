<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>海龟汤 - 设计稿</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Serif SC", Georgia, serif;
      background: #F5F0E6 url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
      color: #3D2B1F;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: #FDFBF6;
      border: 1px solid #D9CFC0;
      box-shadow: 0 8px 32px rgba(61,43,31,0.15);
      min-height: calc(100vh - 48px);
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 24px 32px;
      border-bottom: 2px solid #3D2B1F;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 4px;
    }
    .back-btn {
      padding: 8px 16px;
      border: 1px solid #3D2B1F;
      background: transparent;
      color: #3D2B1F;
      font-family: inherit;
      cursor: pointer;
    }
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 0;
    }
    .left {
      border-right: 1px solid #D9CFC0;
      display: flex;
      flex-direction: column;
    }
    .surface {
      padding: 32px;
      background: linear-gradient(to bottom, #FDFBF6 0%, #F7F2E8 100%);
      border-bottom: 1px dashed #C4B8A8;
    }
    .surface-label {
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #8B2635;
      margin-bottom: 12px;
    }
    .surface h1 {
      font-size: 24px;
      margin-bottom: 16px;
      font-weight: 700;
    }
    .surface p {
      line-height: 1.9;
      font-size: 16px;
    }
    .chat {
      flex: 1;
      padding: 24px 32px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message {
      max-width: 80%;
      padding: 14px 18px;
      line-height: 1.7;
      position: relative;
    }
    .message.user {
      align-self: flex-end;
      background: #EBE4D6;
      border: 1px solid #D9CFC0;
    }
    .message.ai {
      align-self: flex-start;
      background: #FDFBF6;
      border: 1px solid #C4B8A8;
      border-left: 3px solid #8B2635;
    }
    .input-area {
      padding: 20px 32px;
      border-top: 1px solid #D9CFC0;
      display: flex;
      gap: 12px;
      background: #F7F2E8;
    }
    .input-area input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #A89B8C;
      background: #FDFBF6;
      font-family: inherit;
      font-size: 15px;
      outline: none;
    }
    .input-area button {
      padding: 12px 24px;
      background: #8B2635;
      color: #FDFBF6;
      border: none;
      font-family: inherit;
      cursor: pointer;
    }
    .right {
      padding: 32px 24px;
      background: #F7F2E8;
    }
    .clue-board {
      position: sticky;
      top: 24px;
    }
    .clue-board h3 {
      font-size: 16px;
      margin-bottom: 20px;
      padding-bottom: 8px;
      border-bottom: 1px solid #C4B8A8;
    }
    .clue {
      padding: 14px;
      margin-bottom: 12px;
      background: #FDFBF6;
      border: 1px solid #D9CFC0;
      font-size: 14px;
      line-height: 1.6;
      transition: all 0.3s ease;
    }
    .clue.discovered {
      border-left: 3px solid #8B2635;
      color: #3D2B1F;
    }
    .note-status {
      font-size: 13px;
      color: #6B5E52;
      margin-bottom: 16px;
      font-style: italic;
    }
    .answer-section {
      margin-top: 24px;
      padding: 20px;
      border: 2px solid #8B2635;
      background: #FDFBF6;
      text-align: center;
    }
    .answer-section.locked {
      opacity: 0.5;
      border-style: dashed;
    }
    .answer-section button {
      padding: 10px 20px;
      background: #8B2635;
      color: #FDFBF6;
      border: none;
      font-family: inherit;
      cursor: pointer;
    }
    @media (max-width: 768px) {
      main { grid-template-columns: 1fr; }
      .left { border-right: none; border-bottom: 1px solid #D9CFC0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">海龟汤</div>
      <button class="back-btn">返回故事列表</button>
    </header>
    <main>
      <div class="left">
        <section class="surface">
          <div class="surface-label">汤面</div>
          <h1>午夜列车</h1>
          <p>一名男子在午夜空无一人的列车上死去，手里攥着一张撕碎的车票。车厢里没有其他人，门窗都从内部反锁。警方调查后发现，男子并非他杀，也不是自杀。请问发生了什么？</p>
        </section>
        <section class="chat">
          <div class="message user">男子是列车上的工作人员吗？</div>
          <div class="message ai">是。</div>
          <div class="message user">车票是他自己撕碎的吗？</div>
          <div class="message ai">是。</div>
          <div class="message user">他的死和列车运行有关吗？</div>
          <div class="message ai">是也不是。</div>
        </section>
        <section class="input-area">
          <input type="text" placeholder="输入你的问题……" value="">
          <button>发送</button>
        </section>
      </div>
      <aside class="right">
        <div class="clue-board">
          <h3>侦探笔记</h3>
          <p class="note-status">你在调查中记下了这些发现：</p>
          <div class="clue discovered">男子不是普通乘客</div>
          <div class="clue discovered">车票是被他自己撕碎的</div>
          <div class="answer-section locked">
            <p style="margin-bottom: 12px;">继续追问，更多真相会浮出水面。</p>
            <button disabled>揭开汤底</button>
          </div>
        </div>
      </aside>
    </main>
  </div>
</body>
</html>
